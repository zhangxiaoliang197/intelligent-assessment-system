# ============================================================
# 智能评估系统 - Docker Compose 配置
# ------------------------------------------------------------
# 生产环境部署前请通过 .env 文件或环境变量覆盖以下关键配置：
#   MYSQL_HOST     — 元数据库地址（无默认值，必须配置；远程填 IP，本地开发通过 .env 配置）
#   MYSQL_PORT     — 元数据库端口（默认 3306）
#   MYSQL_DATABASE — 元数据库名（默认 assessment）
#   MYSQL_USER     — 元数据库用户名（默认 root）
#   MYSQL_PASSWORD — 元数据库密码（无默认值，必须通过 .env 或环境变量配置）
#   DB_TYPE        — 元数据库类型（默认 mysql，可选 h2/postgresql）
#
# drivers 命名卷说明：
#   首次启动时 Docker 会把镜像内 /app/drivers 的驱动（MySQL/PostgreSQL/
#   SQL Server）自动复制到命名卷，之后通过 Web 界面上传的 Oracle/达梦等
#   驱动也会持久化到该卷，容器重启不丢失。
# ============================================================

services:
  frontend:
    image: assessment-frontend:latest
    container_name: assessment-frontend
    ports:
      - "10086:80"
    restart: always
    networks:
      - assessment-net

  knowledge-service:
    image: assessment-knowledge:latest
    container_name: assessment-knowledge
    ports:
      - "10252:10252"
    restart: always
    networks:
      - assessment-net
    volumes:
      - knowledge-data:/app/data

  qa-service:
    image: assessment-qa:latest
    container_name: assessment-qa
    ports:
      - "10253:10253"
    restart: always
    networks:
      - assessment-net
    environment:
      - ADMIN_SERVICE_URL=http://assessment-admin:10258
      - KNOWLEDGE_SERVICE_URL=http://assessment-knowledge:10252
    volumes:
      - qa-data:/app/data

  indicator-service:
    image: assessment-indicator:latest
    container_name: assessment-indicator
    ports:
      - "10254:10254"
    restart: always
    networks:
      - assessment-net
    environment:
      - QA_SERVICE_URL=http://assessment-qa:10253
      - ADMIN_SERVICE_URL=http://assessment-admin:10258
      - KNOWLEDGE_SERVICE_URL=http://assessment-knowledge:10252
      - EVALUATION_API_URL=http://assessment-qa:10253
    volumes:
      - indicator-data:/app/data

  evaluation-service:
    image: assessment-evaluation:latest
    container_name: assessment-evaluation
    ports:
      - "10255:10255"
    restart: always
    networks:
      - assessment-net
    volumes:
      - evaluation-data:/app/data

  ontology-service:
    image: assessment-ontology:latest
    container_name: assessment-ontology
    ports:
      - "10256:10256"
    restart: always
    networks:
      - assessment-net
    volumes:
      - ontology-data:/app/data

  admin-service:
    image: assessment-admin:latest
    container_name: assessment-admin
    ports:
      - "10258:10258"
    restart: always
    networks:
      - assessment-net
    # ─── 元数据库连接配置（与 start-docker-run.sh / deploy-centos7.sh 对齐）───
    # MYSQL_HOST 无默认值：必须通过 .env 或环境变量显式配置。
    #   - 远程数据库：填 IP 地址（如 192.168.1.100）
    #   - 宿主机数据库：填 host.docker.internal（需配合下方 extra_hosts）
    #   - 本地开发：.env 文件中配置 MYSQL_HOST=localhost
    environment:
      - DB_TYPE=${DB_TYPE:-mysql}
      - MYSQL_HOST=${MYSQL_HOST:-}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-assessment}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
    # Linux 下让 host.docker.internal 解析到宿主机网关
    # （仅在 MYSQL_HOST=host.docker.internal 时需要，远程数据库可忽略）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ─── JDBC 驱动持久化 ───
    # 命名卷首次挂载会自动从镜像内 /app/drivers 复制现有驱动；
    # 之后通过管理后台上传的 Oracle/达梦等驱动也会持久化到此卷。
    volumes:
      - drivers-data:/app/drivers

networks:
  assessment-net:
    driver: bridge

volumes:
  knowledge-data:
  qa-data:
  indicator-data:
  evaluation-data:
  ontology-data:
  drivers-data:
