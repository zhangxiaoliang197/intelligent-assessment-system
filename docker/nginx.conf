server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 允许大文件上传（与 admin-service 50MB 保持一致）
    client_max_body_size 50m;

    # 前端路由 history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── 智能问答服务 (QA 10253) ───
    # 路由: /api/qa/* → /qa/*, /api/config/* → /config/*
    location ~ ^/api/(config|qa)/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://assessment-qa:10253;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式传输支持 (/api/qa/chat/stream)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ─── 图片上传 (QA 10253) ───
    location /api/image/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://assessment-qa:10253;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── 附件上传 (QA 10253) ───
    location /api/attachment/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://assessment-qa:10253;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── 模型图片支持 (QA 10253) ───
    location /api/model/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://assessment-qa:10253;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 知识库服务 (Knowledge 10252) ───
    # 路由: /api/knowledge/* → /knowledge/*
    location /api/knowledge/ {
        proxy_pass http://assessment-knowledge:10252/knowledge/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ─── 指标分析服务 (Indicator 10254) ───
    # 路由: /api/indicator/* → /indicator/*
    location /api/indicator/ {
        proxy_pass http://assessment-indicator:10254/indicator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式传输支持 (/api/indicator/analyze/stream)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ─── 本体模型服务 (Ontology 10256) ───
    # 路由: /api/ontology/* → /ontology/*
    location /api/ontology/ {
        proxy_pass http://assessment-ontology:10256/ontology/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 基础管理服务 (Admin 10258) ───
    # 路由: /api/admin/* → /api/admin/* (无 rewrite，后端本身就是 /api/admin 前缀)
    location /api/admin/ {
        proxy_pass http://assessment-admin:10258/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 评估分析服务 (QA 10253) ───
    # 路由: /api/evaluation/* → /evaluation/*
    location /api/evaluation/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://assessment-qa:10253;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式传输支持 (/api/evaluation/analyze/stream)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
